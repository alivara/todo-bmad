name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs; never cancel a push to main so every main commit keeps an honest check.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  web:
    name: web (lint / format / unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Unit tests (vitest)
        run: npm run test:unit

  api:
    name: api (gofmt / golangci-lint / go test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: gofmt (diff check)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to run on:"; echo "$unformatted"; exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          # Build golangci-lint from source with the setup-go toolchain (Go 1.26) so its
          # embedded build-Go version is >= the module's targeted Go (go.mod: go 1.26).
          # Prebuilt release binaries currently lag (built with Go 1.25) and refuse to run.
          install-mode: goinstall
          working-directory: api

      - name: Unit tests (go test)
        run: go test ./...
